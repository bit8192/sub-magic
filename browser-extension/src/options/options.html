<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Sub Magic 设置</title>
	<link rel="stylesheet" href="options.css" />
</head>
<body>
	<div class="header">
		<h1>Sub Magic 设置</h1>
	</div>

	<div class="section">
		<h2>Mihomo API</h2>
		<p class="desc">本地 mihomo 内核的 API 控制器地址和密钥</p>
		<div class="form-group">
			<label>控制器地址</label>
			<input type="text" id="mihomo-url" placeholder="127.0.0.1:9090" />
		</div>
		<div class="form-group">
			<label>API 密钥 (secret)</label>
			<div class="input-with-toggle">
				<input type="password" id="mihomo-secret" placeholder="在配置文件的 secret 字段设置" />
				<button type="button" class="toggle-visibility" data-target="mihomo-secret">显示</button>
			</div>
		</div>
	</div>

	<div class="section">
		<h2>Sub Magic 远程接口</h2>
		<p class="desc">Sub Magic 的 Worker 地址和 API Key，用于远程写入规则</p>
		<div class="form-group">
			<label>Sub Magic 地址</label>
			<input type="text" id="submagic-url" placeholder="https://your-worker.workers.dev" />
		</div>
		<div class="form-group">
			<label>API Key</label>
			<div class="input-with-toggle">
				<input type="password" id="submagic-key" placeholder="在首页的 API Key 卡片中复制" />
				<button type="button" class="toggle-visibility" data-target="submagic-key">显示</button>
			</div>
		</div>
	</div>

	<div class="section">
		<h2>代理隔离</h2>
		<p class="desc" id="proxy-isolation-desc">Firefox 中可按标签页隔离代理配置；Chrome 仅支持全局代理。</p>
		<label class="checkbox-row">
			<input type="checkbox" id="proxy-isolation" />
			<span>开启代理隔离</span>
		</label>
		<p class="hint" id="proxy-isolation-hint"></p>
	</div>

	<div class="section">
		<h2>默认代理配置</h2>
		<p class="desc">设置全局默认代理。端口候选来自 Mihomo `/configs` 中所有非 0 代理端口，以及 `/listeners` 返回的所有有效 listener 端口。</p>
		<div class="section-title">状态 <span id="proxy-status" class="status-chip loading">检测中</span></div>
		<div class="form-group">
			<label>代理端口</label>
			<select id="proxy-port">
				<option value="">请选择</option>
			</select>
		</div>
		<div class="form-group">
			<label>代理方式</label>
			<select id="proxy-type">
				<option value="http">HTTP</option>
				<option value="https">HTTPS</option>
				<option value="socks4">SOCKS4</option>
				<option value="socks5">SOCKS5</option>
			</select>
		</div>
		<div class="form-group">
			<label>代理授权用户</label>
			<select id="proxy-auth-user">
				<option value="">不使用代理用户</option>
			</select>
			<div class="form-hint" id="proxy-auth-user-hint"></div>
		</div>
		<div class="proxy-meta" id="proxy-meta"></div>
	</div>

	<div class="actions">
		<button id="btn-save" class="btn btn-primary">保存</button>
		<span id="save-status" class="save-status"></span>
	</div>

	<script src="options.js" type="module"></script>
</body>
</html>
