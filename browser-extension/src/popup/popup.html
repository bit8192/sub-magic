<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Sub Magic</title>
	<link rel="stylesheet" href="popup.css" />
</head>
<body>
	<div class="header">
		<h1>Sub Magic</h1>
	</div>

	<div class="section" id="proxy-section">
		<div class="section-title">代理控制 <span id="proxy-status" class="routing-status loading">不可用</span></div>
		<div class="form-group">
			<label>代理方式</label>
			<select id="proxy-type">
				<option value="http">HTTP</option>
				<option value="https">HTTPS</option>
				<option value="socks4">SOCKS4</option>
				<option value="socks5">SOCKS5</option>
			</select>
		</div>
			<div class="form-group">
				<label>代理授权用户</label>
				<select id="proxy-auth-user">
					<option value="">不使用代理用户</option>
				</select>
				<div class="form-hint" id="proxy-auth-user-hint"></div>
			</div>
		<div class="form-group" id="proxy-listener-group" style="display:none">
			<label>Listener</label>
			<select id="proxy-listener">
				<option value="">请选择</option>
			</select>
		</div>
		<div class="proxy-meta" id="proxy-meta"></div>
		<div class="form-actions">
			<button id="btn-apply-proxy" class="btn btn-secondary" disabled>不可用</button>
		</div>
	</div>

	<div class="section" id="routing-section" style="display:none">
		<div class="section-title">路由链路 <span id="routing-status" class="routing-status loading">连接中...</span></div>
		<div id="routing-result" class="routing-result"></div>
	</div>

	<div class="section" id="rule-section" style="display:none">
		<div class="section-title" style="gap:8px">
			<button id="btn-back-routing" class="btn-icon" title="返回路由链路">&#8592;</button>
			<span id="rule-panel-title">添加规则</span>
		</div>
		<div class="form-group">
			<label>规则类型</label>
			<select id="rule-type">
				<option value="DOMAIN-SUFFIX">DOMAIN-SUFFIX</option>
				<option value="DOMAIN">DOMAIN</option>
				<option value="DOMAIN-KEYWORD">DOMAIN-KEYWORD</option>
				<option value="GEOSITE">GEOSITE</option>
				<option value="GEOIP">GEOIP</option>
				<option value="IP-CIDR">IP-CIDR</option>
				<option value="SRC-IP-CIDR">SRC-IP-CIDR</option>
				<option value="IN-PORT">IN-PORT</option>
				<option value="IN-TYPE">IN-TYPE</option>
				<option value="IN-USER">IN-USER</option>
				<option value="IN-NAME">IN-NAME</option>
				<option value="RULE-SET">RULE-SET</option>
				<option value="MATCH">MATCH</option>
			</select>
		</div>
		<div class="form-group" id="payload-group">
			<label>匹配值</label>
			<div id="rule-payload-control">
				<input type="text" id="rule-payload" placeholder="example.com" />
			</div>
		</div>
		<div class="form-group">
			<label>代理组/策略</label>
			<select id="rule-proxy-select">
				<option value="">加载中...</option>
			</select>
			<input type="text" id="rule-proxy-input" placeholder="自定义..." style="display:none" />
		</div>
		<div class="form-group">
			<label>优先级</label>
			<select id="rule-priority-select">
				<option value="">最顶部</option>
			</select>
			<div class="form-hint" id="rule-priority-hint">最顶部</div>
		</div>
		<div class="form-group" id="no-resolve-group" style="display:none">
			<label for="rule-no-resolve">
				<input type="checkbox" id="rule-no-resolve" />
				no-resolve
			</label>
		</div>
		<div class="form-actions" id="btn-group-add">
			<button id="btn-add-rule" class="btn btn-primary">添加规则</button>
		</div>
		<div class="form-actions" id="btn-group-edit" style="display:none">
			<button id="btn-save-rule" class="btn btn-primary">保存修改</button>
			<button id="btn-delete-rule" class="btn btn-danger">删除</button>
		</div>
		<div id="rule-result" class="result-box"></div>
	</div>

	<div class="section" id="selector-section" style="display:none">
		<div class="section-title" style="gap:8px">
			<button id="btn-back-selector" class="btn-icon" title="返回路由链路">&#8592;</button>
			<span id="selector-panel-title">代理链路</span>
		</div>
		<div id="selector-meta" class="selector-meta"></div>
		<div id="selector-result" class="selector-result"></div>
	</div>

	<div class="footer">
		<button id="btn-settings" class="btn-link">设置</button>
		<button id="btn-control-panel" class="btn-link" style="display:none">控制面板</button>
	</div>

	<script src="popup.js" type="module"></script>
</body>
</html>
